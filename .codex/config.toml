approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true
writable_roots = [
  'C:\Users\cent\Documents\NumDesTools\Config',
  'C:\Users\cent\Documents\NumDesOutput',
  'C:\Users\cent\AppData\Local\Temp',
  'C:\tmp',
]
