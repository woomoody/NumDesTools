interface:
  display_name: "NumDes Unity MCP"
  short_description: "通过 unity-mcp 驱动 Unity Editor"
  default_prompt: "Use $numdestools-unity-mcp to inspect or automate a Unity Editor through MCP."

dependencies:
  tools:
    - type: "mcp"
      value: "unity-mcp"
      description: "Local Unity MCP server exposed at the user's machine."
      transport: "streamable_http"
      url: "http://localhost:8080/mcp"

policy:
  allow_implicit_invocation: true
